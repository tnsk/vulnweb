; ===== KASITLI ZAYIF — SADECE EĞİTİM LAB =====
; OWASP PHP Configuration Cheat Sheet'in güvenli baseline'ı BİLEREK ters çevrilmiştir.
; Host'u container sınırı + loopback binding korur (bkz. README — güvenlik notları).

; --- RFI ve remote stream wrapper'ları açar ---
allow_url_fopen        = On    ; güvenli = Off
allow_url_include      = On    ; güvenli = Off  (LFI'yi RFI'ye çeviren ANA direktif)

; --- Bilgi sızdırma: path/SQL/stack-trace saldırgana açılır ---
display_errors         = On    ; güvenli = Off
display_startup_errors = On    ; güvenli = Off
error_reporting        = E_ALL
expose_php             = On    ; güvenli = Off (X-Powered-By: PHP/x.y banner)

; --- Dosya yükleme labları (unrestricted upload / webshell) ---
file_uploads           = On
upload_max_filesize    = 64M   ; güvenli ~2M; shell-upload labları için gevşetildi
post_max_size          = 80M
max_file_uploads       = 50

; --- OWASP'ın kapatılmasını söylediği tehlikeli fonksiyonlar AÇIK ---
disable_functions      =       ; (boş) -> system, exec, shell_exec, passthru, proc_open, popen, phpinfo ...
disable_classes        =
enable_dl              = On

; --- OWASP'ın önerdiği docroot jail YOK -> LFI/path-traversal container FS'inde gezer ---
open_basedir           =       ; (unset) (host hâlâ container sınırıyla korunur)

; --- CSRF / session-fixation / cookie-theft labları için zayıf session ---
session.use_strict_mode = 0    ; güvenli = 1 (session fixation'a izin verir)
session.cookie_httponly = 0    ; güvenli = 1 (XSS'in cookie okumasına izin verir)
session.cookie_secure   = 0    ; güvenli = 1
session.cookie_samesite =      ; güvenli = Strict (CSRF'e izin verir)

; Not: modern PHP'de magic_quotes yok (5.4'te kaldırıldı). Eski-tarz bug sınıfı için
; ya kod sanitize etmez (mevcut yaklaşım) ya da legacy PHP imajı kullanılır.
